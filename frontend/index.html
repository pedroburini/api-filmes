<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FilmRate</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #d0d0d0;
      min-height: 100vh;
    }

    header {
      padding: 1.25rem 2rem;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      background: #0f0f0f;
      z-index: 10;
    }

    .logo { font-size: 1rem; font-weight: 600; color: #f0f0f0; letter-spacing: 0.04em; cursor: pointer; }
    .logo span { color: #555; font-weight: 400; font-size: 0.8rem; margin-left: 8px; }

    .search-bar { display: flex; gap: 6px; flex: 1; max-width: 420px; }

    .search-bar input {
      flex: 1;
      padding: 0.6rem 0.9rem;
      border-radius: 6px;
      border: 1px solid #222;
      background: #151515;
      color: #e0e0e0;
      font-size: 0.875rem;
      outline: none;
      transition: border 0.2s;
    }

    .search-bar input::placeholder { color: #444; }
    .search-bar input:focus { border-color: #444; }

    .search-bar button {
      padding: 0.6rem 1rem;
      background: #222;
      color: #bbb;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .search-bar button:hover { background: #2a2a2a; color: #f0f0f0; }

    .filters {
      display: flex;
      gap: 12px;
      padding: 1rem 2rem;
      flex-wrap: wrap;
      border-bottom: 1px solid #1a1a1a;
      align-items: flex-end;
    }

    .filter-group { display: flex; flex-direction: column; gap: 5px; }

    .filter-label { font-size: 0.72rem; color: #555; text-transform: uppercase; letter-spacing: 0.06em; }

    .filters select {
      padding: 0.5rem 0.75rem;
      background: #151515;
      border: 1px solid #222;
      border-radius: 6px;
      color: #bbb;
      font-size: 0.8rem;
      outline: none;
      cursor: pointer;
    }

    .filters select:focus { border-color: #444; }

    /* RANGE SLIDER DUPLO */
    .range-wrap {
      position: relative;
      width: 160px;
      height: 28px;
      display: flex;
      align-items: center;
    }

    .range-track {
      position: absolute;
      width: 100%;
      height: 3px;
      background: #222;
      border-radius: 2px;
      top: 50%;
      transform: translateY(-50%);
    }

    .range-fill {
      position: absolute;
      height: 3px;
      background: #555;
      border-radius: 2px;
      top: 50%;
      transform: translateY(-50%);
    }

    .range-wrap input[type=range] {
      -webkit-appearance: none;
      position: absolute;
      width: 100%;
      height: 3px;
      background: transparent;
      pointer-events: none;
      outline: none;
    }

    .range-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #888;
      border: 1px solid #555;
      pointer-events: all;
      cursor: pointer;
      transition: background 0.15s;
    }

    .range-wrap input[type=range]::-webkit-slider-thumb:hover { background: #ccc; }

    .rating-input {
      padding: 0.5rem 0.75rem;
      background: #151515;
      border: 1px solid #222;
      border-radius: 6px;
      color: #bbb;
      font-size: 0.8rem;
      outline: none;
      width: 100px;
    }

    .rating-input:focus { border-color: #444; }

    .filter-actions { display: flex; gap: 8px; align-items: flex-end; margin-left: auto; }

    .btn-apply {
      padding: 0.5rem 1.1rem;
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #ccc;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-apply:hover { background: #272727; color: #f0f0f0; }

    .btn-clear {
      padding: 0.5rem 0.75rem;
      background: none;
      border: 1px solid #1e1e1e;
      border-radius: 6px;
      color: #444;
      font-size: 0.8rem;
      cursor: pointer;
      transition: color 0.15s;
    }

    .btn-clear:hover { color: #888; border-color: #333; }

    .grid-container { padding: 1.5rem 2rem; }

    .grid-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .grid-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.08em; color: #444; }

    .sort-select {
      padding: 0.35rem 0.65rem;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 5px;
      color: #666;
      font-size: 0.75rem;
      outline: none;
      cursor: pointer;
    }

    .poster-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 14px;
    }

    .poster-card {
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      background: #151515;
      border: 1px solid #1a1a1a;
      transition: transform 0.2s, border-color 0.2s;
      aspect-ratio: 2/3;
    }

    .poster-card:hover { transform: translateY(-4px); border-color: #333; }
    .poster-card:hover .poster-overlay { opacity: 1; }

    .poster-card img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .poster-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.92) 40%, transparent 100%);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0.75rem;
    }

    .poster-title { font-size: 0.78rem; font-weight: 500; color: #f0f0f0; line-height: 1.3; margin-bottom: 4px; }
    .poster-meta { font-size: 0.7rem; color: #888; display: flex; justify-content: space-between; }

    .poster-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: rgba(0,0,0,0.8);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.7rem;
      color: #ccc;
    }

    .type-badge {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.8);
      border: 1px solid #2a2a2a;
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.65rem;
      color: #777;
    }

    .sentinel {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .sentinel .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #222;
      animation: pulse 1.2s infinite;
    }

    .sentinel .dot:nth-child(2) { animation-delay: 0.2s; }
    .sentinel .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,100%{opacity:0.15} 50%{opacity:0.6} }

    .sentinel.hidden { display: none; }

    /* SEARCH RESULTS */
    .results-list {
      display: none;
      flex-direction: column;
      gap: 6px;
      max-width: 560px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #131313;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .result-item:hover { background: #181818; border-color: #333; }

    .result-item img {
      width: 38px;
      height: 56px;
      object-fit: cover;
      border-radius: 4px;
      background: #1e1e1e;
    }

    .result-info strong { display: block; font-size: 0.9rem; color: #e0e0e0; font-weight: 500; }
    .result-info span { font-size: 0.75rem; color: #555; }

    /* DETAILS */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      overflow-y: auto;
      padding: 2rem 1rem;
      backdrop-filter: blur(3px);
    }

    .modal-overlay.active { display: flex; align-items: flex-start; justify-content: center; }

    .modal-box {
      background: #111;
      border-radius: 12px;
      border: 1px solid #1e1e1e;
      overflow: hidden;
      width: 100%;
      max-width: 760px;
      position: relative;
      margin: auto;
    }

    .modal-close {
      position: absolute;
      top: 14px;
      right: 16px;
      background: none;
      border: none;
      color: #444;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      z-index: 10;
      line-height: 1;
      transition: color 0.15s;
    }

    .modal-close:hover { color: #ccc; }

    .back-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #aaa;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0.5rem 1rem;
      display: inline-block;
      margin-bottom: 1rem;
      transition: background 0.15s, color 0.15s;
    }

    .back-btn:hover { background: #222; color: #f0f0f0; }

    .details-card {
      background: #111;
      border-radius: 10px;
      border: 1px solid #1e1e1e;
      overflow: hidden;
    }

    .details-top { display: flex; gap: 1.75rem; padding: 1.75rem; }

    .details-top img {
      width: 150px;
      min-width: 150px;
      border-radius: 8px;
      object-fit: cover;
    }

    .details-info h2 { font-size: 1.35rem; font-weight: 600; color: #f0f0f0; margin-bottom: 0.3rem; line-height: 1.3; }
    .d-meta { font-size: 0.78rem; color: #555; margin-bottom: 0.9rem; }
    .synopsis { font-size: 0.85rem; line-height: 1.65; color: #888; margin-bottom: 1rem; }
    .crew { font-size: 0.8rem; color: #555; line-height: 1.8; }
    .crew strong { color: #888; font-weight: 500; }

    .section { padding: 1.25rem 1.75rem; border-top: 1px solid #1a1a1a; }
    .section-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #444; margin-bottom: 1rem; }

    .ratings-grid { display: flex; gap: 0.75rem; flex-wrap: wrap; }

    .rating-badge {
      background: #0f0f0f;
      border: 1px solid #1e1e1e;
      border-radius: 8px;
      padding: 0.65rem 1rem;
      text-align: center;
      min-width: 100px;
    }

    .rating-badge .source { font-size: 0.7rem; color: #444; margin-bottom: 5px; }
    .rating-badge .score { font-size: 1.25rem; font-weight: 600; color: #ccc; }
    .rating-badge.average { background: #1a1a1a; border-color: #2a2a2a; }
    .rating-badge.average .source { color: #555; }
    .rating-badge.average .score { color: #e0e0e0; }

    .streaming-logos { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }

    .streaming-logos img {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      object-fit: cover;
      border: 1px solid #1e1e1e;
      opacity: 0.85;
      transition: opacity 0.15s;
    }

    .streaming-logos img:hover { opacity: 1; }
    .no-streaming { font-size: 0.8rem; color: #444; }

    @media (max-width: 600px) {
      header { flex-direction: column; align-items: flex-start; }
      .search-bar { max-width: 100%; width: 100%; }
      .poster-grid { grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); }
      .details-top { flex-direction: column; align-items: center; text-align: center; }
      .details-top img { width: 120px; }
      .filters { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo" onclick="goHome()">FilmRate <span>notas e streaming</span></div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Buscar título..." />
    <button onclick="search()">Buscar</button>
  </div>
</header>

<div class="filters" id="filtersBar">
  <div class="filter-group">
    <span class="filter-label">Tipo</span>
    <select id="filterType">
      <option value="all">Todos</option>
      <option value="movie">Filmes</option>
      <option value="tv">Séries</option>
    </select>
  </div>

  <div class="filter-group">
    <span class="filter-label">Gênero</span>
    <select id="filterGenre"><option value="">Todos</option></select>
  </div>

  <div class="filter-group">
    <span class="filter-label">Ano: <span id="yearDisplay">Todos</span></span>
    <div class="range-wrap" id="rangeWrap">
      <div class="range-track"></div>
      <div class="range-fill" id="rangeFill"></div>
      <input type="range" id="yearMin" min="1950" max="2026" value="1950" step="1" oninput="onYearInput()" />
      <input type="range" id="yearMax" min="1950" max="2026" value="2026" step="1" oninput="onYearInput()" />
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-label">Nota mínima (TMDB)</span>
    <input type="number" class="rating-input" id="filterRating" placeholder="Ex: 7.0" min="0" max="10" step="0.5" />
  </div>

  <div class="filter-group">
    <span class="filter-label">Ordenar por</span>
    <select id="filterSort">
      <option value="rating">Nota</option>
      <option value="popularity">Popularidade</option>
      <option value="year_desc">Ano (recente)</option>
      <option value="year_asc">Ano (antigo)</option>
    </select>
  </div>

  <div class="filter-actions">
    <button class="btn-apply" onclick="applyFilters()">Aplicar</button>
    <button class="btn-clear" onclick="clearFilters()">Limpar</button>
  </div>
</div>

<div id="homeView">
  <div class="grid-container">
    <div class="grid-header">
      <div class="grid-title" id="gridTitle">Popular agora</div>
    </div>
    <div class="poster-grid" id="posterGrid"></div>
  </div>
  <div class="sentinel" id="sentinel">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<div class="results-list" id="resultsList"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="detailsCard"></div>
  </div>
</div>

<script>
  const API = 'https://api-filmes-production-5797.up.railway.app/api';
  let currentPage = 1;
  let isLoading = false;
  let hasMore = true;
  let activeFilters = {};

  // Init
  loadGenres();
  updateRangeFill();
  setupInfiniteScroll();
  applyFilters();

  document.getElementById('searchInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') search();
  });

  // ── RANGE SLIDER ──────────────────────────────────────
  function onYearInput() {
    let min = parseInt(document.getElementById('yearMin').value);
    let max = parseInt(document.getElementById('yearMax').value);
    if (min > max) {
      if (event.target.id === 'yearMin') {
        document.getElementById('yearMin').value = max;
        min = max;
      } else {
        document.getElementById('yearMax').value = min;
        max = min;
      }
    }
    const label = (min === 1950 && max === 2025) ? 'Todos' : `${min} – ${max}`;
    document.getElementById('yearDisplay').textContent = label;
    updateRangeFill();
  }

  function updateRangeFill() {
    const min = parseInt(document.getElementById('yearMin').value);
    const max = parseInt(document.getElementById('yearMax').value);
    const range = 2025 - 1950;
    const left = ((min - 1950) / range) * 100;
    const right = ((2025 - max) / range) * 100;
    document.getElementById('rangeFill').style.left = left + '%';
    document.getElementById('rangeFill').style.right = right + '%';
  }

  // ── GENRES ────────────────────────────────────────────
  async function loadGenres() {
    try {
      const res = await fetch(`${API}/genres`);
      const genres = await res.json();
      const sel = document.getElementById('filterGenre');
      Object.entries(genres).sort((a,b) => a[1].localeCompare(b[1])).forEach(([id, name]) => {
        const opt = document.createElement('option');
        opt.value = id;
        opt.textContent = name;
        sel.appendChild(opt);
      });
    } catch {}
  }

  // ── FILTERS ───────────────────────────────────────────
  function applyFilters() {
    const yearMin = parseInt(document.getElementById('yearMin').value);
    const yearMax = parseInt(document.getElementById('yearMax').value);
    const rating = parseFloat(document.getElementById('filterRating').value);

    activeFilters = {
      media_type: document.getElementById('filterType').value,
      genre_id: document.getElementById('filterGenre').value || null,
      year_min: yearMin > 1950 ? yearMin : null,
      year_max: yearMax < 2026 ? yearMax : null,
      min_rating: !isNaN(rating) ? rating : null,
      sort_by: document.getElementById('filterSort').value,
    };

    const isFiltered = activeFilters.genre_id || activeFilters.year_min || activeFilters.year_max
      || activeFilters.min_rating || activeFilters.media_type !== 'all';
    document.getElementById('gridTitle').textContent = isFiltered ? 'Resultados filtrados' : 'Popular agora';

    currentPage = 1;
    hasMore = true;
    isLoading = false;
    document.getElementById('posterGrid').innerHTML = '';
    loadPopular();
  }

  function clearFilters() {
    document.getElementById('filterType').value = 'all';
    document.getElementById('filterGenre').value = '';
    document.getElementById('yearMin').value = '1950';
    document.getElementById('yearMax').value = '2026';
    document.getElementById('yearDisplay').textContent = 'Todos';
    document.getElementById('filterRating').value = '';
    document.getElementById('filterSort').value = 'popularity';
    updateRangeFill();
    applyFilters();
  }

  // ── LOAD POPULAR ──────────────────────────────────────
  async function loadPopular() {
    if (isLoading || !hasMore) return;
    isLoading = true;

    const pageToLoad = currentPage;
    currentPage++;

    const params = new URLSearchParams({ page: pageToLoad });
    if (activeFilters.media_type && activeFilters.media_type !== 'all')
      params.set('media_type', activeFilters.media_type);
    if (activeFilters.genre_id) params.set('genre_id', activeFilters.genre_id);
    if (activeFilters.year_min) params.set('year_min', activeFilters.year_min);
    if (activeFilters.year_max) params.set('year_max', activeFilters.year_max);
    if (activeFilters.min_rating) params.set('min_rating', activeFilters.min_rating);
    if (activeFilters.sort_by) params.set('sort_by', activeFilters.sort_by);

    console.log('requisitando page:', pageToLoad);

    try {
      const res = await fetch(`${API}/popular?${params}`);
      let data = await res.json();

      console.log('data.length:', data.length, 'page:', pageToLoad);

      renderGrid(data);
      hasMore = data.length > 0;

      if (!hasMore) document.getElementById('sentinel').classList.add('hidden');
      else document.getElementById('sentinel').classList.remove('hidden');

    } catch {
      hasMore = false;
    }

    isLoading = false;
  }

  function renderGrid(items) {
    const grid = document.getElementById('posterGrid');
    items.forEach(item => {
      const card = document.createElement('div');
      card.className = 'poster-card';
      card.innerHTML = `
        <img src="${item.poster || 'https://via.placeholder.com/150x225?text=?'}" alt="${item.title}" loading="lazy" />
        <div class="type-badge">${item.media_type === 'movie' ? 'Filme' : 'Série'}</div>
        ${item.tmdb_rating && item.tmdb_rating !== '0.0' ? `<div class="poster-badge">⭐ ${item.tmdb_rating}</div>` : ''}
        <div class="poster-overlay">
          <div class="poster-title">${item.title}</div>
          <div class="poster-meta">
            <span>${item.year || ''}</span>
            <span>${item.tmdb_rating && item.tmdb_rating !== '0.0' ? item.tmdb_rating : ''}</span>
          </div>
        </div>
      `;
      card.onclick = () => loadDetails(item.tmdb_id, item.media_type);
      grid.appendChild(card);
    });
  }

  // ── INFINITE SCROLL ───────────────────────────────────
  function setupInfiniteScroll() {
    const sentinel = document.getElementById('sentinel');
    const observer = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting && !isLoading && hasMore && currentPage > 1) loadPopular();
    }, { rootMargin: '200px' });
    observer.observe(sentinel);
  }

  // ── SEARCH ────────────────────────────────────────────
  async function search() {
    const q = document.getElementById('searchInput').value.trim();
    if (!q) { goHome(); return; }

    showView('search');
    document.getElementById('resultsList').innerHTML =
      '<div style="color:#444;font-size:0.85rem;padding:1rem">Buscando...</div>';

    try {
      const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
      const data = await res.json();
      renderResults(data);
    } catch {
      document.getElementById('resultsList').innerHTML =
        '<div style="color:#444;font-size:0.85rem;padding:1rem">Erro ao buscar.</div>';
    }
  }

  function renderResults(results) {
    const list = document.getElementById('resultsList');
    list.innerHTML = '';
    if (!results.length) {
      list.innerHTML = '<div style="color:#444;font-size:0.85rem;padding:1rem">Nenhum resultado encontrado.</div>';
      return;
    }
    results.forEach(r => {
      const item = document.createElement('div');
      item.className = 'result-item';
      item.innerHTML = `
        <img src="${r.poster || 'https://via.placeholder.com/38x56?text=?'}" alt="${r.title}" />
        <div class="result-info">
          <strong>${r.title}</strong>
          <span>${r.year || 'S/D'} · ${r.media_type === 'movie' ? 'Filme' : 'Série'}${r.tmdb_rating && r.tmdb_rating !== '0.0' ? ' · ⭐ ' + r.tmdb_rating : ''}</span>
        </div>
      `;
      item.onclick = () => loadDetails(r.tmdb_id, r.media_type);
      list.appendChild(item);
    });
  }

  // ── DETAILS ───────────────────────────────────────────
  async function loadDetails(id, type) {
    document.getElementById('detailsCard').innerHTML =
      '<div style="padding:2rem;text-align:center;color:#444;font-size:0.85rem">Carregando...</div>';
    openModal();

    try {
      const res = await fetch(`${API}/details/${type}/${id}`);
      const d = await res.json();
      renderDetails(d);
    } catch {
      document.getElementById('detailsCard').innerHTML =
        '<div style="padding:2rem;text-align:center;color:#444">Erro ao carregar.</div>';
    }
  }

  function renderDetails(d) {
    const avg = d.average_rating ? `${d.average_rating}` : 'N/A';
    const streaming = d.streaming && d.streaming.length > 0
      ? d.streaming.map(s =>
          `<img src="${s.logo_path}" title="${s.provider_name}" alt="${s.provider_name}" />`
        ).join('')
      : '<span class="no-streaming">Não disponível no Brasil</span>';

    document.getElementById('detailsCard').innerHTML = `
      <div class="details-top">
        <img src="${d.poster || 'https://via.placeholder.com/150x225?text=?'}" alt="${d.title}" />
        <div class="details-info">
          <h2>${d.title} ${d.year ? `<span style="color:#444;font-weight:400;font-size:1rem">(${d.year})</span>` : ''}</h2>
          <p class="d-meta">${[d.genres, d.runtime].filter(Boolean).join(' · ')}</p>
          <p class="synopsis">${d.synopsis || 'Sinopse não disponível.'}</p>
          <div class="crew">
            ${d.director ? `<div><strong>Diretor</strong> ${d.director}</div>` : ''}
            ${d.cast ? `<div><strong>Elenco</strong> ${d.cast}</div>` : ''}
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-label">Avaliações</div>
        <div class="ratings-grid">
          <div class="rating-badge"><div class="source">IMDb</div><div class="score">${d.imdb_rating || 'N/A'}</div></div>
          <div class="rating-badge"><div class="source">Rotten Tomatoes</div><div class="score">${d.rotten_tomatoes || 'N/A'}</div></div>
          <div class="rating-badge"><div class="source">Metacritic</div><div class="score">${d.metacritic || 'N/A'}</div></div>
          <div class="rating-badge"><div class="source">TMDB</div><div class="score">${d.tmdb_rating || 'N/A'}</div></div>
          <div class="rating-badge average"><div class="source">Média</div><div class="score">${avg}</div></div>
        </div>
      </div>
      <div class="section">
        <div class="section-label">Disponível no Brasil</div>
        <div class="streaming-logos">${streaming}</div>
      </div>
    `;
  }

  // ── VIEW MANAGEMENT ───────────────────────────────────
  function showView(view) {
    document.getElementById('homeView').style.display = view === 'home' ? 'block' : 'none';
    document.getElementById('resultsList').style.display = view === 'search' ? 'flex' : 'none';
    document.getElementById('filtersBar').style.display = view === 'home' ? 'flex' : 'none';
    if (view !== 'details') closeModalDirect();
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  function openModal() {
    document.getElementById('modalOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    window.scrollTo({ top: 0 });
  }

  function goBack() {
    closeModalDirect();
  }

  function goHome() {
    document.getElementById('searchInput').value = '';
    showView('home');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
